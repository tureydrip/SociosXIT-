<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - SociosXIT</title>
    <style>
        /* =========================================
           1. FUENTES Y PROTECCIÓN
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');

        * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        :root {
            --neon-purple: #bc13fe;
            --neon-red: #ff073a;
            --glass-bg: rgba(15, 0, 25, 0.75);
        }

        body {
            background-color: #020005;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        /* FONDO DE PARTÍCULAS */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* =========================================
           2. CONTENEDOR Y LOGO
           ========================================= */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem 2.5rem;
            border-radius: 24px;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(188, 19, 254, 0.15),
                inset 0 0 20px rgba(255, 7, 58, 0.05);
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(188, 19, 254, 0.2);
            text-align: center;
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 1.5rem auto;
            display: block;
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple), inset 0 0 10px var(--neon-red);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); box-shadow: 0 0 15px var(--neon-purple); }
            50% { transform: translateY(-8px); box-shadow: 0 0 25px var(--neon-red); }
            100% { transform: translateY(0px); box-shadow: 0 0 15px var(--neon-purple); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, var(--neon-purple), #fff, var(--neon-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 8px rgba(188, 19, 254, 0.4));
        }

        /* =========================================
           3. INPUTS
           ========================================= */
        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-2px);
        }

        /* Clase para ocultar campos que solo son de registro */
        .reg-only {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* =========================================
           4. BOTONES
           ========================================= */
        #actionBtn {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-red) 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(188, 19, 254, 0.3);
            letter-spacing: 1.5px;
        }

        #actionBtn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 7, 58, 0.5);
        }

        #actionBtn:active {
            transform: scale(0.96);
        }

        .btn-secondary {
            background: transparent;
            border: none;
            color: #999;
            margin-top: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            border-bottom: 1px dashed #999;
            padding-bottom: 2px;
        }

        .btn-secondary:hover {
            color: var(--neon-red);
            border-bottom-color: var(--neon-red);
            text-shadow: 0 0 8px rgba(255, 7, 58, 0.6);
        }

        .error {
            color: #ff3333;
            font-size: 0.85rem;
            margin: 10px 0;
            min-height: 20px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* =========================================
           5. SISTEMA DE CARGA ÉPICO
           ========================================= */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 0, 5, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loader-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--neon-purple);
            border-bottom-color: var(--neon-red);
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite, glow 2s ease-in-out infinite alternate;
        }

        .loader-text {
            margin-top: 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--neon-purple);
            animation: pulseText 1.5s infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes glow {
            from { box-shadow: 0 0 10px var(--neon-purple), inset 0 0 10px var(--neon-purple); }
            to { box-shadow: 0 0 30px var(--neon-red), inset 0 0 30px var(--neon-red); }
        }
        @keyframes pulseText {
            0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--neon-purple); }
            50% { opacity: 0.4; text-shadow: none; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div id="loader-overlay">
        <div class="loader-ring"></div>
        <div class="loader-text" id="loader-msg">AUTENTICANDO...</div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <img src="Logo/SOCIOS INFO 20260417_230028.jpg" alt="Logo SociosXIT" class="logo" onerror="this.src='https://via.placeholder.com/90/14001e/bc13fe?text=XIT'">
        
        <h1 id="title">Iniciar Sesión</h1>
        
        <input type="email" id="emailReal" class="reg-only" placeholder="Correo Electrónico" autocomplete="off">
        <input type="tel" id="phone" class="reg-only" placeholder="Teléfono / WhatsApp" autocomplete="off">
        
        <input type="text" id="username" placeholder="Usuario" autocomplete="off">
        <input type="password" id="password" placeholder="Contraseña">
        
        <p id="msg" class="error"></p>
        
        <button id="actionBtn">Entrar</button>
        <button id="toggleBtn" class="btn-secondary">No tengo cuenta, Registrarme</button>
    </div>

    <script>
        // --- EFECTOS VISUALES DE PARTÍCULAS ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? 'rgba(255, 7, 58, ' : 'rgba(188, 19, 254, ';
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color + '1)';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(150, 50, 255, ' + (1 - distance/120) * 0.2 + ')';
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        initParticles();
        animate();
    </script>

    <script type="module">
        import { auth, db, signInWithEmailAndPassword, createUserWithEmailAndPassword, ref, set } from './firebase-config.js';

        const userIn = document.getElementById('username');
        const passIn = document.getElementById('password');
        const emailRealIn = document.getElementById('emailReal');
        const phoneIn = document.getElementById('phone');
        
        const actionBtn = document.getElementById('actionBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const title = document.getElementById('title');
        const msg = document.getElementById('msg');
        const regFields = document.querySelectorAll('.reg-only');
        
        const loaderOverlay = document.getElementById('loader-overlay');
        const loaderMsg = document.getElementById('loader-msg');
        
        let isLogin = true;

        // Cambiar entre Login y Registro
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            title.innerText = isLogin ? "Iniciar Sesión" : "Crear Cuenta";
            actionBtn.innerText = isLogin ? "Entrar" : "Registrarse";
            toggleBtn.innerText = isLogin ? "No tengo cuenta, Registrarme" : "Ya tengo cuenta, Iniciar";
            msg.innerText = "";

            // Ocultar o mostrar los campos extra
            regFields.forEach(field => {
                if (isLogin) {
                    field.style.display = 'none';
                    setTimeout(() => field.style.opacity = '0', 10);
                } else {
                    field.style.display = 'block';
                    setTimeout(() => field.style.opacity = '1', 10);
                }
            });
        });

        // Lógica Principal
        actionBtn.addEventListener('click', async () => {
            const userRaw = userIn.value.trim();
            const userClean = userRaw.replace(/\s/g, ''); 
            const pass = passIn.value;
            const fakeEmail = `${userClean}@sistema.local`; 

            // Variables para los campos nuevos
            const emailReal = emailRealIn.value.trim();
            const phone = phoneIn.value.trim();

            // Validaciones según el modo
            if(isLogin) {
                if(!userClean || !pass) { 
                    msg.innerText = "LLENA USUARIO Y CONTRASEÑA"; 
                    return; 
                }
            } else {
                if(!userClean || !pass || !emailReal || !phone) { 
                    msg.innerText = "LLENA TODOS LOS CAMPOS"; 
                    return; 
                }
            }

            try {
                actionBtn.innerText = "PROCESANDO...";
                actionBtn.disabled = true;

                if(isLogin) {
                    // Solo usa usuario y contraseña
                    await signInWithEmailAndPassword(auth, fakeEmail, pass);
                } else {
                    // Crea la cuenta con el correo falso para mantener el login fácil
                    const userCredential = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                    const uid = userCredential.user.uid;

                    // Guarda TODOS los datos reales en la base de datos
                    await set(ref(db, 'users/' + uid), {
                        username: userClean,
                        correoReal: emailReal, // <--- Guardamos el correo real
                        telefono: phone,       // <--- Guardamos el WhatsApp
                        balance: 0,          
                        role: 'user',        
                        emailAuth: fakeEmail     
                    });
                }

                // Carga Épica
                loaderMsg.innerText = isLogin ? "CONECTANDO AL SERVIDOR..." : "CREANDO PERFIL...";
                loaderOverlay.classList.add('active');

                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 2000);

            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    msg.innerText = "ESTE NOMBRE DE USUARIO YA EXISTE.";
                } else if (error.code === 'auth/weak-password') {
                    msg.innerText = "CONTRASEÑA MUY CORTA (MIN 6).";
                } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    msg.innerText = "USUARIO O CONTRASEÑA INCORRECTOS.";
                } else {
                    msg.innerText = "ERROR: " + error.code;
                }
                
                actionBtn.innerText = isLogin ? "Entrar" : "Registrarse";
                actionBtn.disabled = false;
            }
        });
        
        // Permitir dar ENTER para entrar
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') actionBtn.click();
        });
    </script>
</body>
</html>
