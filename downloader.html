<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Media Downloader - Socios XIT</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    /* =========================================
       1. FUENTES Y VARIABLES CÓSMICAS (Globales)
       ========================================= */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;500;700&family=Poppins:wght@400;600&display=swap');
    
    * { user-select: none; box-sizing: border-box; touch-action: manipulation; }
    
    :root { 
        --neon-pink: #ff0055;
        --neon-blue: #00eeff;
        --neon-purple: #bc13fe;
        --neon-green: #00ffcc; 
        --bg-deep: #030008;
        --glass-bg: rgba(10, 2, 20, 0.85); 
        --sidebar-bg: rgba(5, 0, 15, 0.95); 
    }

    body { 
        background-color: var(--bg-deep); 
        background-image: radial-gradient(circle at center, #1a0033 0%, var(--bg-deep) 70%);
        color: white; font-family: 'Exo 2', sans-serif; 
        margin: 0; padding: 0; min-height: 100dvh; 
        display: flex; flex-direction: column; align-items: center;
        overflow-x: hidden; 
    }

    /* =========================================
       2. FONDOS CÓSMICOS
       ========================================= */
    .cosmic-portal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100vw; height: 100vh; z-index: -2; pointer-events: none; overflow: hidden; }
    .stars { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)); background-repeat: repeat; background-size: 200px 200px; animation: twinkle 4s infinite alternate; opacity: 0.4; }
    @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.7; } }
    #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; pointer-events: none; }

    /* =========================================
       3. ESTILOS DEL MENÚ Y BARRA SUPERIOR
       ========================================= */
    .top-bar { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 700px; background: rgba(10, 2, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(0, 238, 255, 0.4); border-radius: 15px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 20px rgba(0, 238, 255, 0.2); z-index: 100; }
    .menu-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); border-radius: 8px; padding: 6px 10px; font-size: 1.5rem; cursor: pointer; transition: 0.3s; box-shadow: inset 0 0 10px rgba(0, 238, 255, 0.2); }
    .menu-btn:hover { background: rgba(0, 238, 255, 0.1); box-shadow: 0 0 15px var(--neon-blue); transform: scale(1.05); }
    .top-bar-right { display: flex; align-items: center; gap: 10px; overflow-x: auto; padding-bottom: 2px; }
    .top-bar-right::-webkit-scrollbar { display: none; }
    .badge { display: flex; align-items: center; gap: 6px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-family: 'Orbitron', sans-serif; color: #ddd; white-space: nowrap; cursor: pointer; transition: 0.3s; }
    .badge:hover { border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); color: #fff; }
    .badge img { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--neon-blue); object-fit: cover; }
    .badge span { color: #fff; font-weight: 700; }
    .badge.green { border-color: rgba(0, 255, 204, 0.4); cursor: default; }
    .badge.green span { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }

    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 998; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }
    .sidebar { position: fixed; top: 0; left: -300px; width: 260px; height: 100dvh; background: var(--sidebar-bg); border-right: 2px solid var(--neon-purple); box-shadow: 10px 0 30px rgba(188, 19, 254, 0.2); z-index: 999; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; padding: 20px; padding-bottom: 40px; }
    .sidebar.active { left: 0; }
    .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(188, 19, 254, 0.4); padding-bottom: 15px; margin-bottom: 20px; }
    .sidebar-header h2 { margin: 0; font-family: 'Orbitron', sans-serif; color: var(--neon-blue); font-size: 1.3rem; text-shadow: 0 0 10px var(--neon-blue); }
    .close-btn { background: transparent; border: none; color: var(--neon-pink); font-size: 2rem; cursor: pointer; transition: 0.3s; }
    .close-btn:hover { transform: scale(1.1) rotate(90deg); text-shadow: 0 0 10px var(--neon-pink); }
    .sidebar-menu { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; overflow-y: auto; padding-bottom: 20px; overflow-x: hidden; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; color: #ddd; text-decoration: none; padding: 12px 15px; background: rgba(255,255,255,0.02); border-radius: 10px; font-size: 1rem; font-family: 'Exo 2', sans-serif; border: 1px solid transparent; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .sidebar-item i { font-size: 1.4rem; color: var(--neon-purple); transition: 0.3s; }
    .sidebar-item:hover { background: linear-gradient(90deg, rgba(0, 238, 255, 0.15), transparent); border-left: 4px solid var(--neon-blue); color: #fff; box-shadow: -5px 0 15px rgba(0, 238, 255, 0.2); transform: translateX(8px); }
    .sidebar-footer { margin-top: auto; border-top: 1px dashed rgba(188, 19, 254, 0.4); padding-top: 20px; flex-shrink: 0; }
    .logout-btn { width: 100%; background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink); padding: 12px; border-radius: 10px; font-weight: 600; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; z-index: 1; }
    .logout-btn:hover { background: rgba(255, 0, 85, 0.1); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); text-shadow: 0 0 5px var(--neon-pink); }
    .sidebar-version { text-align: center; margin-top: 20px; font-family: 'Exo 2', sans-serif; color: #666; font-size: 0.75rem; display: flex; flex-direction: column; gap: 5px; }
    .version-badge { display: inline-flex; align-items: center; justify-content: center; gap: 5px; color: var(--neon-blue); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; }

    /* =========================================
       4. CONTENEDOR PRINCIPAL DEL DOWNLOADER
       ========================================= */
    .main-wrapper {
        width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; margin-top: 90px; margin-bottom: 40px;
    }

    .hub-container { 
        width: 90%; max-width: 500px; text-align: center; 
        animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        display: flex; flex-direction: column; align-items: center; 
        background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        padding: 2.5rem 2rem; border-radius: 20px; border: 1px solid rgba(0, 238, 255, 0.3);
        box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 238, 255, 0.05);
        position: relative; overflow: hidden;
    }
    
    .hub-container::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
        animation: lightSweep 3s infinite;
    }
    @keyframes lightSweep { 0% { background-position: -200px 0; } 100% { background-position: 400px 0; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(50px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .header-icon { font-size: 4.5rem; color: var(--neon-blue); margin-bottom: 10px; text-shadow: 0 0 20px rgba(0, 238, 255, 0.5); animation: floatIcon 3s ease-in-out infinite; }
    @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .hub-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 5px 0; }
    .hub-desc { color: #ccc; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; font-family: 'Exo 2'; }
    .hub-desc strong { color: var(--neon-green); font-family: 'Orbitron'; letter-spacing: 1px; }

    /* =========================================
       5. INPUTS Y BOTONES
       ========================================= */
    .input-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
    .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; color: var(--neon-blue); opacity: 0.8; }
    
    .cyber-input {
        width: 100%; padding: 15px 15px 15px 45px; background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 238, 255, 0.3); border-radius: 12px; color: white;
        font-family: 'Exo 2'; font-size: 1rem; outline: none; transition: 0.3s;
        box-shadow: inset 0 0 10px rgba(0, 238, 255, 0.1);
    }
    .cyber-input:focus { border-color: var(--neon-blue); box-shadow: inset 0 0 15px rgba(0, 238, 255, 0.2), 0 0 10px rgba(0, 238, 255, 0.2); }
    .cyber-input::placeholder { color: #666; }

    .btn-preview {
        width: 100%; padding: 15px; background: transparent; border: 2px dashed var(--neon-purple);
        color: var(--neon-purple); border-radius: 12px; font-family: 'Orbitron'; font-weight: bold;
        font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: 0.3s; margin-bottom: 20px;
    }
    .btn-preview:hover { background: rgba(188, 19, 254, 0.1); box-shadow: 0 0 15px rgba(188, 19, 254, 0.4); text-shadow: 0 0 5px var(--neon-purple); }

    /* =========================================
       6. CONTENEDOR DE VISTA PREVIA
       ========================================= */
    .preview-container {
        display: none; width: 100%; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 238, 255, 0.2);
        border-radius: 15px; padding: 15px; margin-bottom: 20px; animation: slideDown 0.4s ease-out;
    }
    .preview-container.active { display: block; }
    
    .media-type-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-family: 'Orbitron'; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
    .badge-video { background: rgba(255, 0, 85, 0.2); color: var(--neon-pink); border: 1px solid var(--neon-pink); }
    .badge-audio { background: rgba(0, 238, 255, 0.2); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
    .badge-gallery { background: rgba(188, 19, 254, 0.2); color: var(--neon-purple); border: 1px solid var(--neon-purple); }

    .preview-title { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; margin-bottom: 10px; }
    .preview-info { font-size: 0.85rem; color: #aaa; margin-top: 10px; display: flex; flex-direction: column; gap: 5px; align-items: center; }
    
    .preview-video { width: 100%; max-height: 300px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: #000; }
    .preview-audio { width: 100%; border-radius: 8px; }

    /* Carrusel limpio */
    .carousel-container { position: relative; width: 100%; overflow: hidden; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); }
    .carousel-wrapper { display: flex; transition: transform 0.4s ease-in-out; }
    .carousel-slide { min-width: 100%; }
    .carousel-img { width: 100%; height: 250px; object-fit: contain; background: #050505; }
    .carousel-controls { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 5px; pointer-events: none; }
    .carousel-btn { pointer-events: all; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-blue); color: var(--neon-blue); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; }
    .carousel-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }
    .carousel-indicators { display: flex; justify-content: center; gap: 6px; margin-top: 10px; }
    .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; cursor: pointer; transition: 0.3s; }
    .carousel-dot.active { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

    /* =========================================
       7. BOTONES DE ACCIÓN (DESCARGA)
       ========================================= */
    .action-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    
    .neon-btn {
        width: 100%; padding: 15px; border: none; border-radius: 12px; font-family: 'Orbitron'; 
        font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; justify-content: space-between; 
        align-items: center; transition: 0.3s; text-transform: uppercase; color: #fff;
    }
    .neon-btn-left { display: flex; align-items: center; gap: 10px; }
    .neon-btn i { font-size: 1.4rem; }
    
    .btn-download-video { background: linear-gradient(90deg, #ff0055, #aa0033); box-shadow: 0 0 15px rgba(255, 0, 85, 0.3); border: 1px solid rgba(255, 0, 85, 0.5); }
    .btn-download-video:hover { box-shadow: 0 0 25px rgba(255, 0, 85, 0.6); transform: scale(1.02); }
    
    .btn-download-audio { background: linear-gradient(90deg, #00eeff, #0088aa); color: #000; box-shadow: 0 0 15px rgba(0, 238, 255, 0.3); border: 1px solid rgba(0, 238, 255, 0.5); }
    .btn-download-audio:hover { box-shadow: 0 0 25px rgba(0, 238, 255, 0.6); transform: scale(1.02); }
    
    .btn-download-zip { background: linear-gradient(90deg, #bc13fe, #660099); box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); border: 1px solid rgba(188, 19, 254, 0.5); }
    .btn-download-zip:hover { box-shadow: 0 0 25px rgba(188, 19, 254, 0.6); transform: scale(1.02); }

    .neon-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; transform: none; box-shadow: none; }

    .cost-tag { background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 8px; font-size: 0.8rem; color: #ffcc00; border: 1px solid #ffcc00; }
    .btn-download-audio .cost-tag { border-color: #000; color: #000; background: rgba(255,255,255,0.3); }

    #status { text-align: center; font-size: 0.95rem; min-height: 20px; color: var(--neon-blue); font-family: 'Exo 2'; margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body oncontextmenu="return false;">

  <script src="menu.js"></script>

  <div class="cosmic-portal"><div class="stars"></div></div>
  <canvas id="particle-canvas"></canvas>

  <div class="main-wrapper">
    <div class="hub-container">
      
      <i class='bx bx-cloud-download header-icon'></i>
      <h1 class="hub-title">Media Downloader</h1>
      <p class="hub-desc">Descarga videos, audios y galerías de TikTok o Instagram sin marca de agua.<br><strong>Costo por descarga: $0.1 USD</strong></p>

      <div class="input-wrapper">
        <i class='bx bx-link-alt'></i>
        <input id="url" type="text" class="cyber-input" placeholder="Pega el enlace aquí..." autocomplete="off">
      </div>

      <button class="btn-preview" onclick="previewMedia()">
        <i class='bx bx-search-alt-2'></i> Cargar Vista Previa
      </button>

      <div id="preview" class="preview-container"></div>

      <div class="action-buttons">
        <button class="neon-btn btn-download-video" onclick="downloadMedia('video')" id="btnVideo" style="display:none;">
          <div class="neon-btn-left"><i class='bx bx-video'></i> MP4 Video</div>
          <div class="cost-tag">$0.10</div>
        </button>
        
        <button class="neon-btn btn-download-audio" onclick="downloadMedia('audio')" id="btnAudio" style="display:none;">
          <div class="neon-btn-left"><i class='bx bx-music'></i> MP3 Audio</div>
          <div class="cost-tag">$0.10</div>
        </button>
        
        <button class="neon-btn btn-download-zip" onclick="downloadMedia('gallery')" id="btnGallery" style="display:none;">
          <div class="neon-btn-left"><i class='bx bx-images'></i> ZIP Galería</div>
          <div class="cost-tag">$0.10</div>
        </button>
      </div>

      <p id="status"></p>

    </div>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged, signOut, ref, get, child, runTransaction, push, update } from './firebase-config.js';

    // 👇👇 PEGA AQUÍ TU URL DE RAILWAY 👇👇
    const BACKEND_URL = "https://server-download-production.up.railway.app"; 
    
    const DOWNLOAD_COST = 0.10; 

    let currentUser = null;
    let currentBalance = 0;
    
    window.previewData = null;
    window.currentSlide = 0;
    window.carouselImages = [];

    // =========================================================
    // LÓGICA DEL CARRUSEL (Inyectable en HTML)
    // =========================================================
    window.updateCarousel = () => {
      const wrapper = document.getElementById('carouselWrap');
      if (wrapper) wrapper.style.transform = `translateX(-${window.currentSlide * 100}%)`;
      document.querySelectorAll('.carousel-dot').forEach((dot, idx) => {
        dot.classList.toggle('active', idx === window.currentSlide);
      });
    };
    window.nextSlide = () => { window.currentSlide = (window.currentSlide + 1) % window.carouselImages.length; window.updateCarousel(); };
    window.prevSlide = () => { window.currentSlide = (window.currentSlide - 1 + window.carouselImages.length) % window.carouselImages.length; window.updateCarousel(); };
    window.goToSlide = (index) => { window.currentSlide = index; window.updateCarousel(); };

    // =========================================================
    // EFECTOS VISUALES (Partículas)
    // =========================================================
    const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); let width, height, particles = [];
    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; } window.addEventListener('resize', resize); resize();
    class Particle { constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.vx = (Math.random() - 0.5) * 0.8; this.vy = (Math.random() - 0.5) * 0.8; this.size = Math.random() * 2 + 1; this.color = Math.random() > 0.5 ? 'rgba(0, 238, 255, ' : 'rgba(188, 19, 254, '; this.alpha = Math.random() * 0.4 + 0.1; } update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > width) this.vx *= -1; if (this.y < 0 || this.y > height) this.vy *= -1; } draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = this.color + this.alpha + ')'; ctx.fill(); } }
    for (let i = 0; i < 30; i++) particles.push(new Particle());
    function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); } animate();

    // =========================================================
    // FLUJO DE AUTENTICACIÓN FIREBASE Y EVENTOS DE MENÚ
    // =========================================================
    document.addEventListener('click', (e) => {
        if (e.target && e.target.id === 'logoutMenuBtn' || e.target.closest('#logoutMenuBtn')) {
            e.preventDefault(); signOut(auth).then(() => window.location.href="login.html");
        }
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            const d = new Date(user.metadata.creationTime);
            const joinDateEl = document.getElementById('joinDateDisplay');
            if (joinDateEl) joinDateEl.innerText = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;

            get(child(ref(db), `users/${user.uid}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const topUserEl = document.getElementById('topUserDisplay');
                    const balanceEl = document.getElementById('balanceDisplay');
                    const topAvatarEl = document.getElementById('topAvatar');
                    const adminMenuEl = document.getElementById('adminMenuBtn');

                    if(topUserEl) topUserEl.innerText = data.username || "Usuario";
                    currentBalance = data.balance !== undefined ? parseFloat(data.balance) : 0;
                    if(balanceEl) balanceEl.innerText = currentBalance.toFixed(2);
                    if(topAvatarEl && data.avatar) topAvatarEl.src = data.avatar;
                    if(adminMenuEl && (data.role === 'admin' || data.username?.toLowerCase() === 'sebasxit')) adminMenuEl.style.display = 'flex';
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // =========================================================
    // LÓGICA DE DESCARGADOR (VISTA PREVIA)
    // =========================================================
    window.previewMedia = async () => {
      const url = document.getElementById('url').value.trim();
      const status = document.getElementById('status');
      const previewContainer = document.getElementById('preview');
      
      // Esconder botones primero
      document.getElementById('btnVideo').style.display = 'none';
      document.getElementById('btnAudio').style.display = 'none';
      document.getElementById('btnGallery').style.display = 'none';
      
      if(!url){ 
        status.innerHTML = "<i class='bx bx-error'></i> Pega un enlace válido primero.";
        status.style.color = 'var(--neon-pink)';
        setTimeout(() => status.innerHTML = '', 3000);
        return;
      }
      
      status.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Obteniendo información del enlace...";
      status.style.color = 'var(--neon-blue)';
      previewContainer.classList.remove('active');

      try {
        const form = new FormData();
        form.append('url', url);
        
        const res = await fetch(`${BACKEND_URL}/preview`, { method:'POST', body: form });
        if(!res.ok) throw new Error("Error en el servidor o enlace no válido.");

        window.previewData = await res.json();
        
        if(window.previewData.success) {
          let html = '';
          window.currentSlide = 0;
          
          if(window.previewData.type === 'gallery' && window.previewData.images) {
            window.carouselImages = window.previewData.images;
            html = `
              <div class="media-type-badge badge-gallery"><i class='bx bx-images'></i> GALERÍA (${window.carouselImages.length} FOTOS)</div>
              <div class="preview-title">${window.previewData.title || 'Galería de Redes'}</div>
              <div class="carousel-container">
                <div class="carousel-wrapper" id="carouselWrap">
                  ${window.carouselImages.map(img => `<div class="carousel-slide"><img src="${img}" class="carousel-img" loading="lazy"></div>`).join('')}
                </div>
                ${window.carouselImages.length > 1 ? `
                  <div class="carousel-controls">
                    <button class="carousel-btn" onclick="prevSlide()"><i class='bx bx-chevron-left'></i></button>
                    <button class="carousel-btn" onclick="nextSlide()"><i class='bx bx-chevron-right'></i></button>
                  </div>
                ` : ''}
              </div>
              ${window.carouselImages.length > 1 ? `
                <div class="carousel-indicators">
                  ${window.carouselImages.map((_, idx) => `<div class="carousel-dot ${idx === 0 ? 'active' : ''}" onclick="goToSlide(${idx})"></div>`).join('')}
                </div>
              ` : ''}
              <div class="preview-info"><span><i class='bx bx-info-circle'></i> Se descargará un ZIP con todas las imágenes.</span></div>
            `;
            document.getElementById('btnGallery').style.display = 'flex';
            
          } else if (window.previewData.type === 'video') {
            html = `
              <div class="media-type-badge badge-video"><i class='bx bx-video'></i> VIDEO MP4</div>
              <div class="preview-title">${window.previewData.title || 'Video Extraído'}</div>
              ${window.previewData.video_url 
                ? `<video controls class="preview-video" controlsList="nodownload"><source src="${window.previewData.video_url}" type="video/mp4"></video>` 
                : `<img src="${window.previewData.thumbnail}" class="preview-video"><div class="preview-info" style="color:var(--neon-pink);"><i class='bx bx-hide'></i> Vista previa no disponible. Debes descargar para ver.</div>`}
              <div class="preview-info">${window.previewData.uploader ? `<span><i class='bx bx-user'></i> Autor: ${window.previewData.uploader}</span>` : ''}</div>
            `;
            document.getElementById('btnVideo').style.display = 'flex';
            document.getElementById('btnAudio').style.display = 'flex';
            
          } else if (window.previewData.type === 'audio') {
            html = `
              <div class="media-type-badge badge-audio"><i class='bx bx-music'></i> AUDIO MP3</div>
              <div class="preview-title">${window.previewData.title || 'Audio Extraído'}</div>
              ${window.previewData.audio_url ? `<audio controls class="preview-audio"><source src="${window.previewData.audio_url}" type="audio/mpeg"></audio>` : ''}
              <div class="preview-info">${window.previewData.uploader ? `<span><i class='bx bx-user'></i> Autor: ${window.previewData.uploader}</span>` : ''}</div>
            `;
            document.getElementById('btnAudio').style.display = 'flex';
          }
          
          previewContainer.innerHTML = html;
          previewContainer.classList.add('active');
          status.innerHTML = "<i class='bx bx-check-double'></i> ¡Contenido encontrado!";
          status.style.color = 'var(--neon-green)';
          setTimeout(() => status.innerHTML = '', 3000);
        }
      } catch(err) {
        status.innerHTML = "<i class='bx bx-error'></i> No se pudo cargar el medio. Verifica el link.";
        status.style.color = 'var(--neon-pink)';
      }
    };

    // =========================================================
    // LÓGICA DE DESCARGA CON COBRO FIREBASE
    // =========================================================
    window.downloadMedia = async (kind) => {
      const url = document.getElementById('url').value.trim();
      const status = document.getElementById('status');
      
      if(!currentUser) { alert("ERROR: Debes iniciar sesión para descargar."); return; }
      if(!url) return;
      if(currentBalance < DOWNLOAD_COST) {
          status.innerHTML = `<i class='bx bx-wallet'></i> Saldo insuficiente. Cuesta $${DOWNLOAD_COST} USD.`;
          status.style.color = 'var(--neon-pink)';
          return;
      }
      
      const buttons = document.querySelectorAll('.neon-btn');
      buttons.forEach(btn => btn.disabled = true);
      
      let downloadType = kind === 'video' ? 'MP4' : kind === 'audio' ? 'MP3' : 'ZIP';
      status.innerHTML = `<i class='bx bx-loader-alt bx-spin'></i> Extrayendo ${downloadType}. No cierres la página...`;
      status.style.color = 'var(--neon-blue)';

      try {
        // 1. TRANSACCIÓN DE COBRO EN FIREBASE
        const userRef = ref(db, `users/${currentUser.uid}`);
        const transactionResult = await runTransaction(userRef, (user) => {
            if (user === null) return user;
            let currentBal = parseFloat(user.balance || 0);
            if (currentBal >= DOWNLOAD_COST) {
                user.balance = parseFloat((currentBal - DOWNLOAD_COST).toFixed(2));
                return user;
            }
            return; 
        });

        if (!transactionResult.committed) throw new Error("Saldo insuficiente.");

        // Actualizar UI
        currentBalance = parseFloat(transactionResult.snapshot.val().balance);
        document.getElementById('balanceDisplay').innerText = currentBalance.toFixed(2);

        // Guardar historial
        const historyRef = push(ref(db, `users/${currentUser.uid}/history`));
        await update(ref(db, `users/${currentUser.uid}/history/${historyRef.key}`), { 
            product: `Descarga Media (${downloadType})`, 
            key: url.substring(0, 30) + '...', 
            price: DOWNLOAD_COST, 
            date: Date.now() 
        });

        // 2. PETICIÓN DE DESCARGA A RAILWAY
        const form = new FormData();
        form.append('url', url);
        form.append('kind', kind);
        
        const res = await fetch(`${BACKEND_URL}/download`, { method:'POST', body: form });
        
        if(!res.ok) throw new Error("Fallo en el servidor de descarga.");
        
        const disposition = res.headers.get('content-disposition') || '';
        const match = disposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
        let filename = `SociosXIT_Media_${new Date().getTime()}.${kind === 'video' ? 'mp4' : kind === 'audio' ? 'mp3' : 'zip'}`;
        if (match && match[1]) filename = decodeURIComponent(match[1].replace(/['"]/g, '').replace(/UTF-8''/i, ''));

        const blob = await res.blob();
        const urlBlob = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = urlBlob;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(urlBlob);
        
        status.innerHTML = `<i class='bx bx-check-double'></i> ¡Descarga finalizada! (-$${DOWNLOAD_COST})`;
        status.style.color = 'var(--neon-green)';
        
      } catch(err) {
        status.innerHTML = `<i class='bx bx-error'></i> Error: ${err.message}`;
        status.style.color = 'var(--neon-pink)';
      } finally {
        buttons.forEach(btn => btn.disabled = false);
      }
    };
  </script>
</body>
</html>
