<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;user-select:none;}

:root{
--neon-cyan:#00f3ff;
--neon-purple:#bc13fe;
--bg:#020005;
}

body{
background:var(--bg);
color:white;
font-family:'Poppins';
overflow-x:hidden;
display: flex;
flex-direction: column;
min-height: 100vh;
}

/* FONDO */
#particle-canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-1;
}

/* HEADER */
.header-title{
font-family:'Orbitron';
text-align:center;
margin:40px 0 10px;
font-size:2rem;
background:linear-gradient(90deg,var(--neon-cyan),#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeDown 1s ease;
}

/* BUSCADOR */
.search-box{
width:90%;
max-width:600px;
margin:20px auto;
display:flex;
align-items:center;
background:rgba(0,0,0,0.6);
border:1px solid var(--neon-cyan);
border-radius:10px;
padding:10px;
backdrop-filter:blur(10px);
box-shadow:0 0 10px rgba(0,243,255,.3);
animation:fadeUp 1s ease;
}

.search-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:14px;
padding-left:10px;
}

.search-box i{
color:var(--neon-cyan);
font-size:18px;
}

/* CONTENEDOR DE CONTENIDO PRINCIPAL */
.main-content {
flex: 1;
width: 100%;
}

.tutorials-container{
width:95%;
max-width:800px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
padding-bottom:40px;
}

/* ESPACIOS PARA ADSENSE */
.adsense-slot {
width: 100%;
min-height: 90px; /* Altura mínima recomendada por Google */
background: rgba(255, 255, 255, 0.05); /* Fondo sutil para indicar que hay un anuncio cargando */
border: 1px dashed var(--neon-purple);
border-radius: 10px;
margin: 20px 0;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
}

/* TARJETAS */
.tutorial-card{
position:relative;
border-radius:15px;
padding:20px;
overflow:hidden;
opacity:0;
transform:translateY(30px);
animation:cardEnter .6s forwards;
text-align: center;
}

.tutorial-card::after{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:conic-gradient(transparent,rgba(0,243,255,0.25),transparent,rgba(188,19,254,0.25),transparent);
animation:rotateGlow 6s linear infinite;
z-index:0;
}

.tutorial-card::before{
content:"";
position:absolute;
inset:2px;
background:rgba(15,0,25,0.9);
border-radius:15px;
z-index:1;
}

.tutorial-card > *{
position:relative;
z-index:2;
}

.tutorial-card:hover{
transform:translateY(-5px) scale(1.02);
box-shadow:0 0 20px rgba(0,243,255,.3);
}

.tutorial-title{
font-family:'Orbitron';
color:var(--neon-cyan);
display:flex;
justify-content: center;
gap:10px;
margin-bottom:15px;
}

.tutorial-logo {
width: 90px;
height: 90px;
border-radius: 50%;
object-fit: cover;
border: 2px solid var(--neon-cyan);
box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
margin: 0 auto 15px auto;
display: block;
}

/* AdSense valora el texto descriptivo */
.tutorial-desc{
font-size:14px;
line-height: 1.6;
color:#ccc;
background:rgba(0,0,0,.6);
padding:15px;
border-radius:8px;
margin-bottom:15px;
border-left:3px solid var(--neon-purple);
text-align: left;
}

.btn-download{
display:inline-flex;
justify-content:center;
align-items:center;
gap:8px;
padding:12px 24px;
border-radius:10px;
border:1px solid var(--neon-cyan);
color:var(--neon-cyan);
text-decoration:none;
font-family:'Orbitron';
transition:.3s;
margin-top: 10px;
}

.btn-download:hover{
background:var(--neon-cyan);
color:#000;
box-shadow:0 0 20px var(--neon-cyan);
}

.back-btn{
position:fixed;
top:20px;
left:20px;
color:var(--neon-cyan);
font-size:20px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:10px;
border:1px solid var(--neon-cyan);
transition:.3s;
z-index:10;
}

.back-btn:hover{
background:var(--neon-cyan);
color:#000;
}

/* FOOTER OBLIGATORIO PARA ADSENSE */
.site-footer {
background: rgba(0, 0, 0, 0.8);
border-top: 1px solid var(--neon-purple);
padding: 20px;
text-align: center;
font-size: 12px;
color: #888;
z-index: 5;
position: relative;
}

.site-footer a {
color: var(--neon-cyan);
text-decoration: none;
margin: 0 10px;
transition: 0.3s;
}

.site-footer a:hover {
color: var(--neon-purple);
}

@keyframes fadeDown{ from{opacity:0;transform:translateY(-30px);} to{opacity:1;transform:translateY(0);} }
@keyframes fadeUp{ from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
@keyframes cardEnter{ to{opacity:1;transform:translateY(0);} }
@keyframes rotateGlow{ 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
</style>

<body>

<canvas id="particle-canvas"></canvas>

<a href="dashboard.html" class="back-btn">
<i class='bx bx-arrow-back'></i>
</a>

<div class="main-content">
    <h1 class="header-title">
    <i class='bx bx-book-reader'></i> Tutoriales Oficiales
    </h1>

    <div class="search-box">
    <i class='bx bx-search'></i>
    <input type="text" id="searchInput" placeholder="Buscar tutorial...">
    </div>

    <div class="adsense-slot">
        <p style="color:#555; font-size:10px;">[Espacio para Anuncio Google AdSense]</p>
    </div>

    <div class="tutorials-container" id="tutorialsList">
    <p style="text-align:center;color:var(--neon-cyan);font-family:Orbitron;">Cargando...</p>
    </div>
</div>

<footer class="site-footer">
    <p>&copy; 2026 LUCK XIT OFC. Todos los derechos reservados.</p>
    <div style="margin-top:10px;">
        <a href="privacidad.html">Política de Privacidad</a> | 
        <a href="terminos.html">Términos de Servicio</a> | 
        <a href="contacto.html">Contacto</a>
    </div>
</footer>

<script type="module">
// Asegúrate de que la ruta a tu firebase-config.js sea correcta
import { db, ref, get } from './firebase-config.js';

let allTutorials = [];

async function loadTutorials(){
const container = document.getElementById('tutorialsList');

try{
const snap = await get(ref(db,'tutorials'));

if(!snap.exists()){
container.innerHTML="<p style='text-align:center;'>No hay tutoriales disponibles en este momento.</p>";
return;
}

allTutorials=[];
snap.forEach(child=>{
allTutorials.push({id:child.key,...child.val()});
});

allTutorials.sort((a,b)=>b.timestamp-a.timestamp);

renderTutorials(allTutorials);

}catch(e){
container.innerHTML="<p style='text-align:center; color:red;'>Error al cargar los datos.</p>";
}
}

function renderTutorials(list){
const container = document.getElementById('tutorialsList');
container.innerHTML="";

list.forEach((data,i)=>{
// Para AdSense, asegúrate de que la descripción (data.description) tenga AL MENOS 100-200 palabras de texto explicativo real.
let desc = data.description ? `<div class="tutorial-desc">${data.description}</div>`:"";
let logoHtml = data.logo ? `<img src="${data.logo}" class="tutorial-logo" alt="Logo de Tutorial">` : "";

container.innerHTML += `
<div class="tutorial-card" style="animation-delay:${i*0.1}s">
<h2 class="tutorial-title">
<i class='bx bxs-file'></i> ${data.title}
</h2>
${logoHtml}
${desc}
<a href="${data.link}" target="_blank" class="btn-download">
<i class='bx bx-download'></i> LEER Y DESCARGAR
</a>
</div>
`;

// Opcional: Insertar un anuncio cada 3 tutoriales
if ((i + 1) % 3 === 0) {
    container.innerHTML += `
    <div class="adsense-slot">
        <p style="color:#555; font-size:10px;">[Espacio para Anuncio Google AdSense]</p>
    </div>`;
}
});
}

document.getElementById('searchInput').addEventListener('input',e=>{
const value = e.target.value.toLowerCase();
const filtered = allTutorials.filter(t =>
t.title.toLowerCase().includes(value) ||
(t.description && t.description.toLowerCase().includes(value))
);
renderTutorials(filtered);
});

loadTutorials();

/* PARTICULAS */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let w,h,particles=[];

function resize(){
w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

class P{
constructor(){
this.x=Math.random()*w;
this.y=Math.random()*h;
this.vx=(Math.random()-0.5)*0.7;
this.vy=(Math.random()-0.5)*0.7;
this.size=Math.random()*2+1;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="rgba(0,243,255,0.5)";
ctx.fill();
}
update(){
this.x+=this.vx;
this.y+=this.vy;
if(this.x<0||this.x>w)this.vx*=-1;
if(this.y<0||this.y>h)this.vy*=-1;
}
}

for(let i=0;i<60;i++)particles.push(new P());

function anim(){
ctx.clearRect(0,0,w,h);
particles.forEach(p=>{p.update();p.draw();});
requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
