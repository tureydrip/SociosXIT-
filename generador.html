<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Enlaces - SociosXIT</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap');
        * { user-select: none; box-sizing: border-box; }
        :root { --neon-purple: #bc13fe; --neon-red: #ff073a; --neon-cyan: #00f3ff; --neon-green: #00ffcc; --glass-bg: rgba(15, 0, 25, 0.7); }
        
        body { background-color: #020005; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .main-container { width: 95%; max-width: 600px; position: relative; z-index: 10; margin-top: 100px; animation: fadeIn 0.5s ease; padding-bottom: 40px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-setup { background: var(--glass-bg); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; }
        .setup-title { font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 20px; color: #fff; }
        
        .input-box { margin-bottom: 20px; text-align: left; }
        .input-box label { display: block; font-size: 0.75rem; color: #aaa; font-family: 'Orbitron'; margin-bottom: 8px; letter-spacing: 1px; }
        .input-box input { width: 100%; padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: white; outline: none; font-size: 1rem; transition: 0.3s; text-align: center; }
        .input-box input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0,243,255,0.2); }
        
        .btn-primary { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan)); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 1px; display: flex; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--neon-cyan); transform: scale(1.02); }

        .result-box { margin-top: 20px; display: none; background: rgba(0, 243, 255, 0.1); border: 1px solid var(--neon-cyan); padding: 15px; border-radius: 12px; }
        .result-box span { font-family: 'Orbitron'; color: var(--neon-cyan); word-break: break-all; }
        
        .copy-btn { margin-top: 10px; background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 8px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
        .copy-btn:hover { background: var(--neon-cyan); color: #000; }
    </style>
</head>
<body oncontextmenu="return false;">
    <canvas id="particle-canvas"></canvas>

    <div class="main-container">
        <div class="card-setup">
            <h2 class="setup-title"><i class='bx bx-link-alt'></i> MONETIZAR ENLACE</h2>
            <div class="input-box">
                <label>URL DEL ARCHIVO ORIGINAL</label>
                <input type="url" id="targetUrl" placeholder="https://mega.nz/...">
            </div>
            <button class="btn-primary" onclick="generateLink()">GENERAR LINK <i class='bx bx-right-arrow-alt'></i></button>
            
            <div class="result-box" id="resultContainer">
                <span id="shortLinkDisplay"></span>
                <button class="copy-btn" onclick="copyShortLink()"><i class='bx bx-copy'></i> Copiar Enlace</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, ref, push, set } from './firebase-config.js';

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = "login.html";
            }
        });

        window.generateLink = async () => {
            const urlInput = document.getElementById('targetUrl').value;
            if (!urlInput.startsWith('http')) return alert("Ingresa una URL válida.");

            try {
                const linksRef = ref(db, 'monetized_links');
                const newLinkRef = push(linksRef);
                const linkId = newLinkRef.key;

                await set(newLinkRef, {
                    owner: currentUser.uid,
                    target: urlInput,
                    views: 0,
                    createdAt: Date.now()
                });

                const currentDomain = window.location.origin;
                const finalUrl = `${currentDomain}/ads.html?l=${linkId}`;
                
                document.getElementById('shortLinkDisplay').innerText = finalUrl;
                document.getElementById('resultContainer').style.display = 'block';
                document.getElementById('targetUrl').value = '';

            } catch (error) {
                alert("Error al generar enlace: " + error.message);
            }
        };

        window.copyShortLink = () => {
            const text = document.getElementById('shortLinkDisplay').innerText;
            navigator.clipboard.writeText(text);
            alert("Enlace copiado al portapapeles.");
        };
    </script>
    <script>
        // Animación de partículas base
        const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); let w, h, pts = [];
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; } window.addEventListener('resize', resize); resize();
        class Pt { constructor() { this.x=Math.random()*w; this.y=Math.random()*h; this.v=Math.random()*0.5; } update(){ this.y-=this.v; if(this.y<0)this.y=h; } draw(){ ctx.fillStyle="rgba(0,243,255,0.3)"; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill(); } }
        for(let i=0; i<50; i++) pts.push(new Pt());
        function anim() { ctx.clearRect(0,0,w,h); pts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(anim); } anim();
    </script>
</body>
</html>
