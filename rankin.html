<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking & Premios - SociosXIT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-database.js"></script>

  <style>
    /* --- FUENTES Y FONDO --- */
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;800&family=Orbitron:wght@400;700&display=swap');
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: #020205;
      color: #fff; 
      min-height: 100vh;
      overflow-x: hidden;
      /* Fondo Grid Animado */
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 255, 0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: bgScroll 20s linear infinite;
    }
    
    @keyframes bgScroll { from { background-position: 0 0; } to { background-position: 40px 40px; } }

    /* Scrollbar Neon */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #020202; }
    ::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 4px; box-shadow: 0 0 10px #00f3ff; }

    /* Efectos de Texto Ultra Neon */
    .text-glow-pink { color: #ff00ff; text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
    .text-glow-cyan { color: #00ffff; text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff; }
    .font-orbitron { font-family: 'Orbitron', sans-serif; }

    /* Contenedores con Borde Brillante */
    .neon-card {
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }
    
    /* Ranking Círculos */
    .rank-circle {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-weight: 800; font-size: 12px; margin-right: 6px;
      z-index: 10; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2);
    }
    @media(min-width: 768px){ .rank-circle { width: 38px; height: 38px; font-size: 18px; margin-right: 12px; } }

    /* --- TOP 3 SUPER BRILLANTES --- */
    
    /* TOP 1: ORO RADIACTIVO */
    .row-top-1 {
      background: linear-gradient(90deg, rgba(255, 215, 0, 0.25), transparent);
      border: 1px solid #FFD700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255, 215, 0, 0.1);
      animation: pulseGold 2s infinite alternate;
    }
    .circle-top-1 { background: #FFD700; color: black; box-shadow: 0 0 15px #FFD700; border: 2px solid white; }
    @keyframes pulseGold { from { box-shadow: 0 0 10px rgba(255,215,0,0.3); } to { box-shadow: 0 0 25px rgba(255,215,0,0.6); } }

    /* TOP 2: PLATA CROMADA */
    .row-top-2 {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), transparent);
      border: 1px solid #00f3ff;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
    }
    .circle-top-2 { background: #e0e0e0; color: black; box-shadow: 0 0 10px white; }

    /* TOP 3: BRONCE MAGMA */
    .row-top-3 {
      background: linear-gradient(90deg, rgba(255, 80, 0, 0.15), transparent);
      border: 1px solid #ff5500;
      box-shadow: 0 0 15px rgba(255, 80, 0, 0.3);
    }
    .circle-top-3 { background: #ff7b00; color: white; box-shadow: 0 0 10px #ff7b00; }

    /* OTROS PUESTOS */
    .row-other { 
      background: rgba(20, 20, 25, 0.6); 
      border-bottom: 1px solid rgba(255,255,255,0.05); 
    }
    .circle-other { background: #222; color: #777; border: 1px solid #444; }

    /* CONTENEDOR DE LA FILA */
    .rank-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 6px; margin-bottom: 6px; border-radius: 4px;
      font-size: 11px; transition: all 0.2s;
    }
    @media(min-width: 768px){ .rank-row { padding: 12px; font-size: 13px; margin-bottom: 8px; } }
    .rank-row:hover { background: rgba(255,255,255,0.1); transform: translateX(2px); }

    /* SI SOY YO */
    .is-me-row { 
      background: rgba(255, 0, 255, 0.15) !important;
      border: 1px solid #ff00ff !important; 
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.4) !important;
    }

    /* ESTILO BOTÓN ADMIN (Edición) */
    .admin-edit-btn {
        background: #ff0000; color: white; border: 1px solid #fff;
        border-radius: 4px; padding: 2px 6px; margin-left: 8px;
        cursor: pointer; font-weight: bold; font-size: 10px;
        box-shadow: 0 0 5px #ff0000;
    }
    .admin-edit-btn:hover { background: #cc0000; }

    /* Animaciones */
    .animate-tilt { animation: tilt 4s infinite linear; }
    @keyframes tilt { 0%, 50%, 100% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } }
  </style>
</head>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCr1-2dIqgxoXBTKYgSusnUZorUICX2Too",
      authDomain: "chatglobal-e9370.firebaseapp.com",
      databaseURL: "https://chatglobal-e9370-default-rtdb.firebaseio.com",
      projectId: "chatglobal-e9370",
      storageBucket: "chatglobal-e9370.firebasestorage.app",
      messagingSenderId: "382420208590",
      appId: "1:382420208590:web:9425fa28c8cdf669adb99f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const currentUser = sessionStorage.getItem("sociosxit_user");
    // Variables para el modo ADMIN
    let isAdminMode = false;
    const btnAdmin = document.getElementById("btnAdmin");

    if (!currentUser) window.location.href = "index.html";
    else {
        document.getElementById('headerUserName').textContent = currentUser.split('@')[0].toUpperCase();
        loadUserBalance();
        checkAdminAccess(); // Verificar si es LK-XT
    }

    const listRecharges = document.getElementById("listRecharges");
    const listSales = document.getElementById("listSales");
    const myRankRecharge = document.getElementById("myRankRecharge");
    const myRankSales = document.getElementById("myRankSales");
    const countdownTimer = document.getElementById("countdownTimer");

    // Elementos del Podio
    const podiumName1 = document.getElementById("podium-name-1");
    const podiumName2 = document.getElementById("podium-name-2");
    const podiumName3 = document.getElementById("podium-name-3");

    function sanitizeEmail(email) { return email.replace(/\./g, "_"); }
    
    function loadUserBalance() {
        const userKey = sanitizeEmail(currentUser);
        db.ref(`users/${userKey}/balance`).on("value", snap => {
            const val = parseFloat(snap.val() || 0);
            document.getElementById('headerBalance').textContent = `$${val.toFixed(2)}`;
        });
    }

    // --- FUNCIONALIDAD ADMIN ---
    function checkAdminAccess() {
        if(currentUser.toUpperCase().includes("LK-XT") || currentUser.toUpperCase().includes("LK XT")) {
            btnAdmin.classList.remove("hidden");
            btnAdmin.addEventListener("click", () => {
                isAdminMode = !isAdminMode;
                btnAdmin.style.backgroundColor = isAdminMode ? "#000" : "#d60000";
                btnAdmin.innerHTML = isAdminMode ? "❌ SALIR" : "💀 ADMIN";
                loadRankings();
            });
        }
    }

    window.editPoints = function(userId, currentName) {
        let amount = prompt(`ADMIN LK-XT:\nEditar saldo para: ${currentName}\n\nIngresa cantidad (ej: 50 para sumar, -20 para restar):`);
        if(!amount) return;
        
        let val = parseFloat(amount);
        if(isNaN(val)) {
            alert("Número inválido");
            return;
        }

        db.ref('users/' + userId + '/balance').transaction((currentBalance) => {
            return (currentBalance || 0) + val;
        }, (error, committed, snapshot) => {
            if (error) {
                alert('Error al actualizar.');
            } else if (committed) {
                alert(`✅ Saldo actualizado para ${currentName}. Nuevo saldo: $${snapshot.val()}`);
            }
        });
    }

    // --- OBTENER FECHAS DEL CICLO ---
    function getCycleDates() {
        const now = new Date();
        let currentYear = now.getFullYear();
        let currentMonth = now.getMonth();
        
        let currentCycleStart, prevCycleStart, prevCycleEnd;

        if (now.getDate() >= 11) {
            currentCycleStart = new Date(currentYear, currentMonth, 11, 0, 0, 0);
            prevCycleStart = new Date(currentYear, currentMonth - 1, 11, 0, 0, 0);
        } else {
            currentCycleStart = new Date(currentYear, currentMonth - 1, 11, 0, 0, 0);
            prevCycleStart = new Date(currentYear, currentMonth - 2, 11, 0, 0, 0);
        }
        prevCycleEnd = currentCycleStart;

        let prevCycleId = `${prevCycleStart.getFullYear()}-${prevCycleStart.getMonth() + 1}`;

        return { currentCycleStart, prevCycleStart, prevCycleEnd, prevCycleId };
    }

    // --- REVISAR, GUARDAR Y ENTREGAR PREMIOS DE CICLOS PASADOS ---
    async function checkAndSavePastWinners(usersData, dates) {
        const prevCycleId = dates.prevCycleId;
        const snap = await db.ref(`cycle_winners/${prevCycleId}`).once('value');
        let winners = {};
        
        if (!snap.exists()) {
            const rankingData = [];
            Object.keys(usersData).forEach(key => {
                let displayName = key.replace(/_gmail_com|_hotmail_com|_outlook_com/g, "").replace(/_/g, "");
                if (displayName === "LK-XT" || displayName === "LK XT" || key.includes("LK-XT")) return;
                
                const u = usersData[key];
                let prevCycleRecharged = 0;
                if (u.recharge_history) {
                    Object.values(u.recharge_history).forEach(r => {
                        const amount = parseFloat(r.amount || 0);
                        const rDate = new Date(r.date);
                        if (rDate >= dates.prevCycleStart && rDate < dates.prevCycleEnd) {
                            prevCycleRecharged += amount;
                        }
                    });
                }
                
                if(prevCycleRecharged > 0) {
                    rankingData.push({ id: key, name: displayName, total: prevCycleRecharged });
                }
            });
            
            rankingData.sort((a, b) => b.total - a.total);
            
            if(rankingData.length > 0) winners[rankingData[0].id] = { rank: 1, prize: 5, claimed: false, name: rankingData[0].name };
            if(rankingData.length > 1) winners[rankingData[1].id] = { rank: 2, prize: 3, claimed: false, name: rankingData[1].name };
            if(rankingData.length > 2) winners[rankingData[2].id] = { rank: 3, prize: 1, claimed: false, name: rankingData[2].name };
            
            if(Object.keys(winners).length > 0) {
                await db.ref(`cycle_winners/${prevCycleId}`).set(winners);
            }
        } else {
            winners = snap.val();
        }

        const myEmailKey = sanitizeEmail(currentUser);
        if (winners && winners[myEmailKey] && winners[myEmailKey].claimed === false) {
            const prize = winners[myEmailKey].prize;
            const rank = winners[myEmailKey].rank;
            
            db.ref(`users/${myEmailKey}/balance`).transaction((currentBalance) => {
                return (currentBalance || 0) + prize;
            }, (error, committed, snapshot) => {
                if (!error && committed) {
                    db.ref(`cycle_winners/${prevCycleId}/${myEmailKey}/claimed`).set(true);
                    showWinnerAlert(rank, prize);
                }
            });
        }
    }

    // --- ALERTA BONITA DE GANADOR ---
    function showWinnerAlert(rank, prize) {
        const overlay = document.createElement("div");
        overlay.className = "fixed inset-0 bg-black/95 z-[100] flex justify-center items-center backdrop-blur-md";
        overlay.innerHTML = `
            <div class="neon-card p-6 md:p-10 rounded-2xl text-center border-2 border-yellow-400 shadow-[0_0_80px_rgba(255,215,0,0.4)] animate-bounce relative max-w-sm w-full mx-4">
                <div class="absolute inset-0 bg-gradient-to-tr from-yellow-500/20 via-pink-500/20 to-cyan-500/20 rounded-2xl blur-xl animate-pulse"></div>
                <h2 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 font-orbitron drop-shadow-[0_0_10px_gold] mb-4">¡FELICIDADES!</h2>
                <p class="text-lg md:text-xl text-white font-bold mb-2">Quedaste en el <span class="text-yellow-400 text-2xl font-black font-orbitron">TOP ${rank}</span> de Recargas del ciclo pasado</p>
                <div class="text-7xl my-6 drop-shadow-[0_0_20px_white]">🏆</div>
                <p class="text-md text-cyan-200 font-bold mb-6">Tu premio fue agregado a tu saldo: <br><span class="text-5xl text-glow-cyan font-black mt-2 inline-block">$${prize} USD</span></p>
                <button onclick="this.parentElement.parentElement.remove()" class="bg-gradient-to-r from-pink-600 to-purple-600 text-white font-black py-3 px-10 rounded-full border border-pink-400 shadow-[0_0_20px_magenta] hover:scale-110 transition-transform text-lg uppercase tracking-widest">¡Genial!</button>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    // --- LÓGICA PRINCIPAL ---
    async function loadRankings() {
      const myEmail = sanitizeEmail(currentUser);
      const dates = getCycleDates();

      try {
        const snapshot = await db.ref('users').once('value');
        const usersData = snapshot.val();
        if (!usersData) return;

        await checkAndSavePastWinners(usersData, dates);

        const rankingDataRecharges = [];
        const rankingDataSales = [];

        Object.keys(usersData).forEach(key => {
            let displayName = key.replace(/_gmail_com|_hotmail_com|_outlook_com/g, "").replace(/_/g, "");
            if (displayName === "LK-XT" || displayName === "LK XT" || key.includes("LK-XT")) return;

            const u = usersData[key];
            
            let cycleSpent = 0; 
            if (u.purchases) {
                Object.values(u.purchases).forEach(p => {
                    const price = parseFloat(p.price || 0);
                    const pDate = new Date(p.date);
                    if (pDate >= dates.currentCycleStart) cycleSpent += price;
                });
            }

            let cycleRecharged = 0;
            if (u.recharge_history) {
                Object.values(u.recharge_history).forEach(r => {
                    const amount = parseFloat(r.amount || 0);
                    const rDate = new Date(r.date);
                    if (rDate >= dates.currentCycleStart) cycleRecharged += amount;
                });
            }

            if(displayName.length > 7) displayName = displayName.substring(0, 7) + "..";

            rankingDataRecharges.push({
                id: key,
                name: displayName,
                cycleRecharged: cycleRecharged,
                isMe: key === myEmail
            });

            rankingDataSales.push({
                id: key,
                name: displayName,
                cycleSpent: cycleSpent,
                isMe: key === myEmail
            });
        });

        // Ordenar y Renderizar Recargas
        rankingDataRecharges.sort((a, b) => b.cycleRecharged - a.cycleRecharged);
        renderList(rankingDataRecharges, listRecharges, 'cycleRecharged', myRankRecharge, '$');
        
        // --- ACTUALIZAR NOMBRES DEL PODIO ---
        if(podiumName1) podiumName1.innerText = rankingDataRecharges[0] && rankingDataRecharges[0].cycleRecharged > 0 ? rankingDataRecharges[0].name : 'VACÍO';
        if(podiumName2) podiumName2.innerText = rankingDataRecharges[1] && rankingDataRecharges[1].cycleRecharged > 0 ? rankingDataRecharges[1].name : 'VACÍO';
        if(podiumName3) podiumName3.innerText = rankingDataRecharges[2] && rankingDataRecharges[2].cycleRecharged > 0 ? rankingDataRecharges[2].name : 'VACÍO';

        // Ordenar y Renderizar Gastos
        rankingDataSales.sort((a, b) => b.cycleSpent - a.cycleSpent);
        renderList(rankingDataSales, listSales, 'cycleSpent', myRankSales, '$');

      } catch (error) {
        console.error("Error ranking:", error);
      }
    }

    // --- RENDERIZADO CON ESTILOS NEON ---
    function renderList(data, container, valueKey, myAlert, prefix) {
        container.innerHTML = "";
        const topData = data.slice(0, 20);
        
        topData.forEach((user, index) => {
            const rank = index + 1;
            
            let rowClass = "row-other";
            let circleClass = "circle-other";
            let textClass = "text-gray-500 font-semibold";
            let icon = "";

            if (rank === 1) {
                rowClass = "row-top-1";
                circleClass = "circle-top-1";
                textClass = "text-yellow-100 font-black drop-shadow-[0_0_5px_gold]";
                icon = "👑";
            } else if (rank === 2) {
                rowClass = "row-top-2";
                circleClass = "circle-top-2";
                textClass = "text-white font-bold drop-shadow-[0_0_5px_white]";
                icon = "🥈";
            } else if (rank === 3) {
                rowClass = "row-top-3";
                circleClass = "circle-top-3";
                textClass = "text-orange-200 font-bold drop-shadow-[0_0_5px_orange]";
                icon = "🥉";
            }

            if (user.isMe) {
                rowClass = "is-me-row";
                textClass = "text-fuchsia-200 font-bold tracking-wider drop-shadow-[0_0_5px_magenta]";
            }

            const finalAmountClass = (valueKey === 'cycleSpent' && user[valueKey] > 0) ? "text-pink-300 drop-shadow-[0_0_3px_magenta]" : (user[valueKey] > 0 ? "text-cyan-300 drop-shadow-[0_0_3px_cyan]" : "text-gray-700");

            let adminBtnHtml = "";
            if (isAdminMode && valueKey === 'cycleRecharged') {
                adminBtnHtml = `<button onclick="editPoints('${user.id}', '${user.name}')" class="admin-edit-btn">✏️</button>`;
            }

            const html = `
                <div class="rank-row ${rowClass}">
                    <div class="flex items-center overflow-hidden w-2/3">
                        <div class="rank-circle ${circleClass}">${rank}</div>
                        <div class="flex flex-col min-w-0">
                            <span class="${textClass} uppercase truncate flex items-center gap-1">
                                ${user.name} <span class="text-[10px]">${icon}</span> ${adminBtnHtml}
                            </span>
                        </div>
                    </div>
                    <div class="font-mono ${finalAmountClass} tracking-tighter text-[10px] md:text-sm ml-1 text-right w-1/3 font-bold">
                        ${prefix}${user[valueKey].toFixed(2)}
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });

        const myIndex = data.findIndex(u => u.isMe);
        if (myIndex !== -1) {
            const val = data[myIndex][valueKey];
            myAlert.innerHTML = `PUESTO #${myIndex + 1} <span class="text-white">($${val.toFixed(2)})</span>`;
            myAlert.classList.remove("hidden");
        } else {
            myAlert.classList.add("hidden");
        }
    }

    // --- TIMER ---
    function startCountdown() {
        const updateTimer = () => {
            const now = new Date();
            let nextReset;
            if (now.getDate() < 11) nextReset = new Date(now.getFullYear(), now.getMonth(), 11, 0, 0, 0);
            else nextReset = new Date(now.getFullYear(), now.getMonth() + 1, 11, 0, 0, 0);

            const diff = nextReset - now;
            if (diff <= 0) { countdownTimer.innerHTML = "<div class='col-span-4 text-glow-pink font-bold animate-pulse py-2'>¡NUEVO CICLO INICIADO! REINICIANDO...</div>"; return; }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            const item = (num, label) => `
                <div>
                    <span class="text-lg md:text-3xl font-black text-white block font-mono" style="text-shadow: 0 0 10px #ff00ff; -webkit-text-stroke: 1px rgba(255,0,255,0.3);">${num<10?'0'+num:num}</span>
                    <span class="text-[8px] text-pink-400 font-bold uppercase tracking-widest">${label}</span>
                </div>`;
            countdownTimer.innerHTML = item(d,"DIAS") + item(h,"HRS") + item(m,"MIN") + item(s,"SEG");
        };
        updateTimer(); setInterval(updateTimer, 1000);
    }

    loadRankings();
    startCountdown();
    setInterval(loadRankings, 30000); 
  </script>
</body>
