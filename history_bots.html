<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Glory Bots</title>
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap');

        * { user-select: none; box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: #050505; color: #ffffff; min-height: 100vh; overflow-x: hidden; position: relative; }

        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, rgba(26, 26, 46, 0.8) 0%, #050505 80%); z-index: -2; }

        .top-bar { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 1000px; 
            background: rgba(15, 20, 30, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
        }

        .back-btn { 
            background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            border-radius: 10px; padding: 8px 12px; font-size: 1.5rem; cursor: pointer; transition: 0.3s; 
            text-decoration: none; display: flex; align-items: center;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); color: #3b82f6; transform: scale(1.05); }

        .page-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: 1px;}

        .main-container { width: 95%; max-width: 800px; margin: 100px auto 40px auto; z-index: 10; display: flex; flex-direction: column; gap: 20px; }

        .empty-state { text-align: center; color: #64748b; padding: 50px 20px; font-size: 1.1rem; }
        .empty-state i { font-size: 4rem; color: rgba(255,255,255,0.1); margin-bottom: 15px; }

        .bot-card {
            background: rgba(20, 25, 35, 0.7); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 25px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: 0.3s;
            animation: fadeInUP 0.5s ease-out forwards;
        }

        .bot-card.status-pendiente { border-left: 5px solid #f59e0b; }
        .bot-card.status-activo { border-left: 5px solid #10b981; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; }
        .clan-id { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #fff; font-weight: 700; }
        .plan-name { color: #94a3b8; font-size: 0.9rem; }

        .status-content { margin-bottom: 20px; line-height: 1.6; font-size: 0.95rem; }
        .status-content.yellow { color: #fcd34d; }
        .status-content.green { color: #34d399; }

        .btn-whatsapp-ban {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 14px; background: rgba(255, 0, 85, 0.1); border: 1px solid #ff0055;
            color: #ff0055; font-family: 'Inter', sans-serif; font-weight: 600;
            border-radius: 12px; text-decoration: none; transition: 0.3s;
        }
        .btn-whatsapp-ban:hover { background: #ff0055; color: #fff; box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); transform: translateY(-2px); }

        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInUP { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pulse { animation: textPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes textPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="bg-overlay"></div>

    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <h2 class="animate-pulse" style="font-family:'Orbitron', sans-serif; color: #fff; font-weight: 300; font-size: 1.2rem; letter-spacing: 2px;">Cargando Historial...</h2>
    </div>

    <div class="top-bar">
        <a href="javascript:history.back()" class="back-btn"><i class='bx bx-chevron-left'></i></a>
        <div class="page-title">MIS BOTS</div>
        <div style="width: 40px;"></div> </div>

    <div class="main-container" id="botsContainer">
        </div>

    <script type="module">
        import { auth, db, onAuthStateChanged, ref, onValue } from './firebase-config.js';

        let currentUserUid = null;
        let username = "";

        function renderBots(orders) {
            const container = document.getElementById('botsContainer');
            container.innerHTML = '';

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class='bx bx-ghost'></i>
                        <p>No tienes bots activos ni en historial.</p>
                    </div>`;
                return;
            }

            // Ordenar por el más reciente
            orders.sort((a, b) => b.timestamp - a.timestamp);

            orders.forEach(order => {
                const date = new Date(order.timestamp).toLocaleString();
                let statusClass = '';
                let statusHtml = '';
                
                if (order.status === 'Pendiente') {
                    statusClass = 'status-pendiente';
                    statusHtml = `
                        <div class="status-content yellow">
                            <p><strong><i class='bx bx-loader-circle bx-spin'></i> PENDIENTE:</strong></p>
                            <p style="color: #cbd5e1; margin-top:5px;">Solicitando permiso al servidor, esto puede tardar hasta 1 hora.</p>
                        </div>
                    `;
                } else if (order.status === 'Activo') {
                    statusClass = 'status-activo';
                    statusHtml = `
                        <div class="status-content green">
                            <p><strong><i class='bx bx-radar bx-flashing'></i> ACTIVO:</strong></p>
                            <p style="color: #cbd5e1; margin-top:5px;">Activando... los bots empiezan a sumar puntos después de 15 a 30 minutos.</p>
                        </div>
                    `;
                } else {
                    statusClass = '';
                    statusHtml = `
                        <div class="status-content" style="color: #64748b;">
                            <p><strong><i class='bx bx-check-circle'></i> FINALIZADO / OTRO:</strong> ${order.status}</p>
                        </div>
                    `;
                }

                // El enlace de WhatsApp con el número que indicaste
                const waLink = `https://wa.me/573142369516?text=Hola,%20soy%20el%20usuario%20${username}.%20Mis%20bots%20del%20clan%20ID%20${order.clanId}%20fueron%20baneados.`;

                const card = document.createElement('div');
                card.className = `bot-card ${statusClass}`;
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="clan-id">CLAN ID: ${order.clanId}</div>
                            <div class="plan-name">${order.product}</div>
                        </div>
                        <div style="font-size: 0.8rem; color: #64748b; text-align: right;">
                            ${date}
                        </div>
                    </div>
                    ${statusHtml}
                    <a href="${waLink}" target="_blank" class="btn-whatsapp-ban">
                        <i class='bx bx-shield-x' style="font-size: 1.2rem;"></i> Mis bots fueron baneados
                    </a>
                `;
                container.appendChild(card);
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserUid = user.uid;
                username = user.displayName || 'Usuario'; // O toma el nombre que tengas en DB si lo prefieres

                const ordersRef = ref(db, 'clan_level_up_orders');
                
                // Escucha en tiempo real la base de datos
                onValue(ordersRef, (snapshot) => {
                    const myOrders = [];
                    if (snapshot.exists()) {
                        snapshot.forEach(childSnap => {
                            const data = childSnap.val();
                            if (data.uid === currentUserUid) {
                                myOrders.push(data);
                            }
                        });
                    }
                    renderBots(myOrders);

                    // Ocultar pantalla de carga
                    setTimeout(() => {
                        const loader = document.getElementById('loadingScreen');
                        if(loader) {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.style.display = 'none', 300);
                        }
                    }, 500);

                }, (error) => {
                    console.error("Error leyendo historial:", error);
                    alert("Error cargando historial de bots.");
                });

            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
